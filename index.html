<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animeci18 Premium - Gelişmiş Anime Akış Platformu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #E5E5E5;
            overflow-x: hidden;
        }
        /* Custom Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222222;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF4500;
        }
        /* Glassmorphism Matrix */
        .glass-panel {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .complex-neon-glow:hover {
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.25);
            border-color: #FF4500;
        }
        /* Ambient Light Glow for Video Theater Mode */
        .ambient-glow {
            box-shadow: 0 0 60px 10px rgba(255, 140, 0, 0.12);
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div id="ageGate" class="fixed inset-0 z-50 flex items-center justify-center bg-[#050505] p-4 transition-all duration-500 hidden">
        <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1200'); filter: blur(8px);"></div>
        <div class="glass-panel w-full max-w-md p-8 rounded-2xl text-center shadow-2xl relative z-10 border border-neutral-800">
            <div class="w-20 h-20 bg-gradient-to-tr from-orange-600 to-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-600/30">
                <span class="text-3xl font-extrabold text-white">18+</span>
            </div>
            <h2 id="ageTitle" class="text-2xl font-bold text-white mb-2"></h2>
            <p id="ageDesc" class="text-neutral-400 text-sm mb-8"></p>
            <div class="flex gap-4 justify-center">
                <button onclick="verifyAge(true)" id="ageYesBtn" class="px-6 py-3 bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 text-white font-semibold rounded-xl transition-all duration-300 transform hover:scale-105 shadow-md shadow-orange-600/20 w-1/2 cursor-pointer"></button>
                <button onclick="verifyAge(false)" id="ageNoBtn" class="px-6 py-3 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 font-semibold rounded-xl transition-all duration-300 w-1/2 cursor-pointer"></button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-40 glass-panel border-b border-neutral-900 px-4 lg:px-8 py-4 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <a href="#" onclick="changeCategory('all')" class="flex items-center gap-2 group">
                <span class="text-2xl font-black tracking-tighter text-white group-hover:text-orange-500 transition-colors">
                    ANIMECI<span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600">18</span>
                </span>
                <span class="bg-orange-600/10 text-orange-500 text-[10px] font-bold px-2 py-0.5 rounded border border-orange-500/20 tracking-widest uppercase">PREMIUM</span>
            </a>

            <div class="flex-1 max-w-md relative hidden md:block">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="searchInput" oninput="handleSearch(this.value)" class="w-full pl-10 pr-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 transition-all text-white placeholder-neutral-500" placeholder="">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="px-3 py-1.5 bg-[#0F0F0F] hover:bg-neutral-800 border border-neutral-800 rounded-lg text-xs font-bold text-neutral-300 flex items-center gap-2 transition-all cursor-pointer">
                    <i class="fa-solid fa-globe text-orange-500"></i>
                    <span id="langBtnText">TR</span>
                </button>

                <button onclick="toggleAdminModal(true)" class="text-neutral-800 hover:text-orange-500/50 p-2 transition-all cursor-pointer text-xs" title="System Configuration">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 lg:px-8 py-6">
        
        <div class="relative w-full mb-6 md:hidden">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" id="mobileSearchInput" oninput="handleSearch(this.value)" class="w-full pl-10 pr-4 py-2.5 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white placeholder-neutral-500" placeholder="">
        </div>

        <div class="flex items-center gap-2 overflow-x-auto pb-4 mb-6 border-b border-neutral-900 scrollbar-none" id="categoryTabs">
            </div>

        <section id="mediaStage" class="mb-10 rounded-3xl overflow-hidden relative min-h-[450px] bg-neutral-950 flex flex-col justify-end">
            </section>

        <section id="catalogSection">
            <h2 id="catalogTitle" class="text-lg font-bold text-white mb-6 flex items-center gap-2 tracking-tight"></h2>
            <div id="videoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
            <div id="emptyState" class="hidden text-center py-20 text-neutral-500">
                <i class="fa-solid fa-clapperboard text-4xl mb-4 block text-neutral-700"></i>
                <span id="emptyStateText"></span>
            </div>
        </section>
    </main>

    <div id="adminModal" class="fixed inset-0 z-50 items-center justify-center bg-black/80 backdrop-blur-md p-4 hidden">
        <div class="glass-panel w-full max-w-2xl rounded-2xl shadow-2xl border border-neutral-800 overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-neutral-900 flex items-center justify-between bg-[#0F0F0F]">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-orange-500"></i>
                    <span id="adminPanelTitle">Yönetici Paneli</span>
                </h3>
                <button onclick="toggleAdminModal(false)" class="text-neutral-400 hover:text-white text-lg cursor-pointer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="adminAuthGate" class="p-8 text-center hidden">
                <i class="fa-solid fa-lock text-3xl text-neutral-800 mb-4 block"></i>
                <p id="adminAuthDesc" class="text-sm text-neutral-400 mb-4"></p>
                <div class="max-w-xs mx-auto">
                    <input type="password" id="adminPasswordInput" class="w-full px-4 py-2.5 bg-[#050505] border border-neutral-800 rounded-xl text-center font-mono text-white mb-3 focus:outline-none focus:border-orange-500" placeholder="••••••••">
                    <button onclick="authenticateAdmin()" id="adminLoginBtn" class="w-full py-2.5 bg-orange-600 hover:bg-orange-500 text-white font-semibold rounded-xl transition-all cursor-pointer"></button>
                </div>
            </div>

            <div id="adminDashboard" class="p-6 overflow-y-auto flex-1 hidden bg-[#050505]">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs text-green-500 font-bold bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20 tracking-wider uppercase">
                        <i class="fa-solid fa-circle-check mr-1"></i> Authorized Control Session
                    </span>
                    <button onclick="logoutAdmin()" id="adminLogoutBtn" class="text-xs text-red-400 hover:text-red-300 underline font-medium cursor-pointer"></button>
                </div>

                <form id="videoUpsertForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                    <input type="hidden" id="formVideoId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Başlık (TR)</label>
                            <input type="text" id="formTitleTR" required class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Title (EN)</label>
                            <input type="text" id="formTitleEN" required class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Açıklama (TR)</label>
                            <textarea id="formDescTR" rows="2" required class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Description (EN)</label>
                            <textarea id="formDescEN" rows="2" required class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white resize-none"></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Kategori / Category</label>
                            <select id="formCategory" class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white">
                                <option value="seri">Seri / Series</option>
                                <option value="film">Film / Movie</option>
                                <option value="aksiyon">Aksiyon / Action</option>
                                <option value="fantastik">Fantastik / Fantasy</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Kapak Görseli URL / Cover URL</label>
                            <input type="url" id="formCoverUrl" required class="w-full px-4 py-2 bg-[#0F0F0F] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white" placeholder="https://...">
                        </div>
                    </div>

                    <div class="border border-neutral-800 p-4 rounded-xl bg-[#0F0F0F]">
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-2">Video Kaynak Türü / Source Type</label>
                        <div class="flex gap-4 mb-4">
                            <label class="flex items-center gap-2 text-sm text-white cursor-pointer">
                                <input type="radio" name="sourceType" value="url" checked onchange="toggleSourceFields('url')" class="accent-orange-500">
                                <span>Uzaktan Link / Remote Embed (Dubz, MP4, YT)</span>
                            </label>
                            <label class="flex items-center gap-2 text-sm text-white cursor-pointer">
                                <input type="radio" name="sourceType" value="local" onchange="toggleSourceFields('local')" class="accent-orange-500">
                                <span>Yerel Dosya Yükle / Local File (IndexedDB)</span>
                            </label>
                        </div>

                        <div id="urlSourceInputGroup">
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Video Kaynak Linki / Embed & MP4 URL</label>
                            <input type="text" id="formVideoUrl" class="w-full px-4 py-2 bg-[#050505] border border-neutral-800 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-white" placeholder="https://dubz.co/v/... veya direct .mp4">
                        </div>

                        <div id="localSourceInputGroup" class="hidden">
                            <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1">Video Dosyası Seç / Choose Video File</label>
                            <input type="file" id="formVideoFile" accept="video/mp4,video/webm" class="w-full text-xs text-neutral-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-orange-600/10 file:text-orange-500 hover:file:bg-orange-600/20 file:cursor-pointer">
                        </div>
                    </div>

                    <div class="flex gap-3 justify-end pt-2">
                        <button type="button" onclick="resetForm()" id="formCancelBtn" class="px-5 py-2 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 font-semibold rounded-xl text-sm transition-all cursor-pointer"></button>
                        <button type="submit" id="formSaveBtn" class="px-5 py-2 bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 text-white font-semibold rounded-xl text-sm transition-all cursor-pointer shadow-md shadow-orange-600/10"></button>
                    </div>
                </form>

                <div class="mt-8">
                    <h4 class="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-3" id="adminInventoryTitle"></h4>
                    <div class="border border-neutral-900 rounded-xl overflow-hidden text-sm bg-[#0F0F0F]">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-neutral-900 bg-neutral-950 text-neutral-400 text-xs uppercase tracking-wider">
                                    <th class="p-3">Görsel / Thumbnail</th>
                                    <th class="p-3">Başlık / Title</th>
                                    <th class="p-3">Kategori / Category</th>
                                    <th class="p-3 text-right">İşlemler / Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminVideoTableBody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="border-t border-neutral-900 bg-[#050505] py-6 px-4 text-center text-xs text-neutral-600">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <p>&copy; 2026 <span class="text-neutral-500 font-semibold tracking-tight">Animeci18 Premium</span>. All Rights Reserved.</p>
            <p class="flex items-center gap-1 text-[11px]"><i class="fa-solid fa-shield-halved text-orange-600/50"></i> High-Grade Sandbox Client Engine Architecture</p>
        </div>
    </footer>

    <script>
        // BILINGUAL LOCALIZATION STORAGE DICTIONARY LAYER
        const dictionary = {
            tr: {
                ageTitle: "Yaş Doğrulaması",
                ageDesc: "Bu web sitesi yetişkinlere özel içerikler barındırmaktadır. Devam etmek için 18 yaşından büyük olduğunuzu doğrulamalısınız.",
                ageYes: "Evet, 18 Yaşından Büyüküm",
                ageNo: "Hayır, Terk Et",
                searchPlaceholder: "Anime, dizi veya film ara...",
                catAll: "Tümü",
                catSeri: "Seri",
                catFilm: "Film",
                catAction: "Aksiyon",
                catFantasy: "Fantastik",
                catWatchlist: "İzleme Listem",
                catalogTitle: "Sizin İçin Seçilen Özel İçerikler",
                catalogTitleWatchlist: "Kişisel İzleme Listeniz",
                emptyState: "Aradığınız kriterlere uygun herhangi bir içerik bulunamadı.",
                adminTitle: "Güvenli Sistem Yönetim Modülü",
                adminDesc: "Kritik altyapı erişimi için yetkili sistem şifresini giriniz.",
                adminLogin: "Kimliği Doğrula",
                adminLogout: "Güvenli Çıkış Yap",
                adminInvTitle: "Mevcut Video Envanter Listesi",
                cancel: "İptal",
                save: "Kaydet",
                commentsTitle: "Kullanıcı Yorumları",
                noComments: "Henüz hiç yorum yapılmamış. İlk yorumu sen yap!",
                commentPlaceholder: "Yorumunuzu buraya yazın...",
                namePlaceholder: "Adınız veya Rumuzunuz",
                postComment: "Yorum Gönder",
                delete: "Sil",
                edit: "Düzenle",
                nowPlaying: "Şimdi Oynatılıyor",
                watchNow: "Şimdi İzle",
                addList: "Listeme Ekle",
                removeList: "Listeden Çıkar",
                toastAddList: "İzleme listenize başarıyla eklendi!",
                toastRemoveList: "İzleme listenizden kaldırıldı.",
                toastComment: "Yorumunuz başarıyla yayınlandı!",
                toastAuthSuccess: "Yönetici kimliği başarıyla doğrulandı.",
                toastSave: "Video kaydı başarıyla güncellendi."
            },
            en: {
                ageTitle: "Age Verification Required",
                ageDesc: "This website contains mature content. You must confirm that you are at least 18 years old to proceed.",
                ageYes: "Yes, I am 18 or older",
                ageNo: "No, Exit Site",
                searchPlaceholder: "Search anime, series or movie...",
                catAll: "All Media",
                catSeri: "Series",
                catFilm: "Movie",
                catAction: "Action",
                catFantasy: "Fantasy",
                catWatchlist: "My Watchlist",
                catalogTitle: "Premium Selections For You",
                catalogTitleWatchlist: "Your Personal Watchlist",
                emptyState: "No premium content matched your specific filtering query.",
                adminTitle: "Secure Infrastructure Module",
                adminDesc: "Enter authorized system passkey to unlock terminal.",
                adminLogin: "Authenticate",
                adminLogout: "Secure Logout",
                adminInvTitle: "Active Media Inventory Grid",
                cancel: "Cancel",
                save: "Commit Changes",
                commentsTitle: "Community Discussion Forum",
                noComments: "No comments registered yet. Be the first to start the thread!",
                commentPlaceholder: "Type your comment responsibly here...",
                namePlaceholder: "Your Name / Pseudonym",
                postComment: "Broadcast Comment",
                delete: "Delete",
                edit: "Edit",
                nowPlaying: "Now Playing",
                watchNow: "Watch Now",
                addList: "Add to List",
                removeList: "Remove From List",
                toastAddList: "Successfully added to your watchlist!",
                toastRemoveList: "Removed from your watchlist.",
                toastComment: "Your comment has been broadcasted!",
                toastAuthSuccess: "Admin access granted successfully.",
                toastSave: "Video parameters committed successfully."
            }
        };

        // CENTRAL REPLICATED STATE LAYER
        let state = {
            videos: [],
            watchlist: JSON.parse(localStorage.getItem('animeciWatchlist')) || [],
            currentLanguage: localStorage.getItem('animeciLang') || 'tr',
            activeFilter: 'all',
            searchQuery: '',
            currentVideoId: null,
            isAdminAuthenticated: sessionStorage.getItem('animeciAdmin') === 'true'
        };

        // INDEXEDDB ENGINE SUBSYSTEM INITIALIZATION
        let db;
        const dbRequest = indexedDB.open("Animeci18DB", 1);
        dbRequest.onupgradeneeded = function(e) {
            let activeDb = e.target.result;
            if (!activeDb.objectStoreNames.contains("localVideos")) {
                activeDb.createObjectStore("localVideos");
            }
        };
        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            initializePlatform();
        };
        dbRequest.onerror = function() {
            initializePlatform();
        };

        // SANITIZATION ENGINE AGAINST XSS ATTACKS
        function sanitizeInput(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#x27;");
        }

        // ACCESSIBLE BILINGUAL TOAST ENGINE LAYER
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = "px-4 py-3 bg-[#0F0F0F] border border-neutral-800 text-white text-xs font-semibold rounded-xl shadow-2xl flex items-center gap-2 pointer-events-auto transition-all duration-300 opacity-0 transform translate-y-2";
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-orange-500"></i> <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3500);
        }

        // PLATFORM RUNTIME INITIALIZATION
        function initializePlatform() {
            if (localStorage.getItem('animeciAgeVerified') !== 'true') {
                const ageGate = document.getElementById('ageGate');
                ageGate.classList.remove('hidden');
                ageGate.classList.add('flex');
            }

            const savedVideos = localStorage.getItem('animeciVideos');
            if (savedVideos) {
                state.videos = JSON.parse(savedVideos);
            } else {
                state.videos = [];
                localStorage.setItem('animeciVideos', JSON.stringify([]));
            }

            applyLocalization();
            renderCategoryTabs();
            renderMediaStage(null); // Load Epic Cinematic Hero Layout Default
            renderCatalog();
        }

        function applyLocalization() {
            const l = dictionary[state.currentLanguage];
            document.getElementById('ageTitle').innerText = l.ageTitle;
            document.getElementById('ageDesc').innerText = l.ageDesc;
            document.getElementById('ageYesBtn').innerText = l.ageYes;
            document.getElementById('ageNoBtn').innerText = l.ageNo;
            document.getElementById('searchInput').placeholder = l.searchPlaceholder;
            document.getElementById('mobileSearchInput').placeholder = l.searchPlaceholder;
            document.getElementById('adminPanelTitle').innerText = l.adminTitle;
            document.getElementById('adminAuthDesc').innerText = l.adminDesc;
            document.getElementById('adminLoginBtn').innerText = l.adminLogin;
            document.getElementById('adminLogoutBtn').innerHTML = `<i class="fa-solid fa-power-off mr-1"></i> ${l.adminLogout}`;
            document.getElementById('formCancelBtn').innerText = l.cancel;
            document.getElementById('formSaveBtn').innerText = l.save;
            document.getElementById('langBtnText').innerText = state.currentLanguage.toUpperCase();
            
            if(state.activeFilter === 'watchlist') {
                document.getElementById('catalogTitle').innerHTML = `<i class="fa-solid fa-bookmark text-orange-500"></i> ${l.catalogTitleWatchlist}`;
            } else {
                document.getElementById('catalogTitle').innerHTML = `<i class="fa-solid fa-fire text-orange-500"></i> ${l.catalogTitle}`;
            }
        }

        function toggleLanguage() {
            state.currentLanguage = state.currentLanguage === 'tr' ? 'en' : 'tr';
            localStorage.setItem('animeciLang', state.currentLanguage);
            applyLocalization();
            renderCategoryTabs();
            renderCatalog();
            renderMediaStage(state.currentVideoId);
        }

        function verifyAge(status) {
            if (status) {
                localStorage.setItem('animeciAgeVerified', 'true');
                document.getElementById('ageGate').classList.replace('flex', 'hidden');
            } else {
                window.location.href = "https://www.google.com";
            }
        }

        function renderCategoryTabs() {
            const l = dictionary[state.currentLanguage];
            const categories = [
                { id: 'all', label: l.catAll, icon: 'fa-layer-group' },
                { id: 'seri', label: l.catSeri, icon: 'fa-tv' },
                { id: 'film', label: l.catFilm, icon: 'fa-film' },
                { id: 'aksiyon', label: l.catAction, icon: 'fa-burst' },
                { id: 'fantastik', label: l.catFantasy, icon: 'fa-wand-magic-sparkles' },
                { id: 'watchlist', label: l.catWatchlist, icon: 'fa-bookmark' }
            ];

            document.getElementById('categoryTabs').innerHTML = categories.map(cat => {
                const isActive = state.activeFilter === cat.id;
                return `
                    <button onclick="changeCategory('${cat.id}')" class="px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap transition-all duration-300 flex items-center gap-2 cursor-pointer
                        ${isActive ? 'bg-gradient-to-r from-orange-600 to-red-600 text-white shadow-lg shadow-orange-600/20 scale-105' : 'bg-[#0F0F0F] text-neutral-400 hover:text-white border border-neutral-900'}">
                        <i class="fa-solid ${cat.icon} ${isActive ? 'text-white' : 'text-orange-500'}"></i>
                        <span>${cat.label}</span>
                    </button>
                `;
            }).join('');
        }

        function changeCategory(catId) {
            state.activeFilter = catId;
            applyLocalization();
            renderCategoryTabs();
            renderCatalog();
        }

        function handleSearch(val) {
            state.searchQuery = val.toLowerCase().trim();
            renderCatalog();
        }

        function toggleWatchlist(id) {
            const index = state.watchlist.indexOf(id);
            const l = dictionary[state.currentLanguage];
            if (index === -1) {
                state.watchlist.push(id);
                showToast(l.toastAddList);
            } else {
                state.watchlist.splice(index, 1);
                showToast(l.toastRemoveList);
            }
            localStorage.setItem('animeciWatchlist', JSON.stringify(state.watchlist));
            if(state.activeFilter === 'watchlist') renderCatalog();
            renderMediaStage(state.currentVideoId);
        }

        function parseVideoSource(url) {
            if (!url) return null;
            const dubzMatch = url.match(/dubz\.co\/(?:v|c|e)\/([a-zA-Z0-9]+)/);
            if (dubzMatch && dubzMatch[1]) return { type: 'iframe', src: `https://dubz.co/e/${dubzMatch[1]}` };
            
            const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (ytMatch && ytMatch[1]) return { type: 'iframe', src: `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&rel=0` };

            return { type: 'native', src: url };
        }

        // CINEMATIC MARQUEE HERO OR ACTIVE HIGH-GRADE THEATER MEDIA PLAYER INJECTOR
        function renderMediaStage(id) {
            const stage = document.getElementById('mediaStage');
            const l = dictionary[state.currentLanguage];
            
            if (!id && state.videos.length > 0) {
                // Pick the latest added video as the Featured Cinematic Hero Element
                const featured = state.videos[state.videos.length - 1];
                const title = state.currentLanguage === 'tr' ? featured.titleTR : featured.titleEN;
                const desc = state.currentLanguage === 'tr' ? featured.descTR : featured.descEN;
                
                stage.innerHTML = `
                    <div class="absolute inset-0 bg-cover bg-center transition-all duration-700" style="background-image: url('${sanitizeInput(featured.coverUrl)}');"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-transparent"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-[#050505] via-transparent to-transparent"></div>
                    <div class="relative z-10 p-6 lg:p-12 max-w-2xl space-y-4">
                        <span class="text-[10px] font-black tracking-widest text-orange-500 bg-orange-500/10 border border-orange-500/20 px-3 py-1 rounded-md uppercase"><i class="fa-solid fa-star mr-1"></i> PREMIUM FEATURED</span>
                        <h1 class="text-3xl lg:text-5xl font-black text-white tracking-tight">${sanitizeInput(title)}</h1>
                        <p class="text-neutral-300 text-xs lg:text-sm leading-relaxed line-clamp-3">${sanitizeInput(desc)}</p>
                        <div class="flex items-center gap-3 pt-2">
                            <button onclick="selectMediaTrack('${featured.id}')" class="px-6 py-3 bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 text-white text-xs font-bold rounded-xl flex items-center gap-2 shadow-lg shadow-orange-600/20 transition-all cursor-pointer transform hover:scale-105">
                                <i class="fa-solid fa-play"></i> <span>${l.watchNow}</span>
                            </button>
                            <button onclick="toggleWatchlist('${featured.id}')" class="px-5 py-3 bg-neutral-900/80 backdrop-blur-md border border-neutral-800 text-white text-xs font-bold rounded-xl flex items-center gap-2 hover:bg-neutral-800 transition-all cursor-pointer">
                                <i class="fa-solid ${state.watchlist.includes(featured.id) ? 'fa-check text-green-500' : 'fa-plus'}"></i> <span>${state.watchlist.includes(featured.id) ? l.removeList : l.addList}</span>
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            const video = state.videos.find(v => v.id === id);
            if (!video) {
                stage.innerHTML = `
                    <div class="m-auto text-center p-8 space-y-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-4xl text-neutral-800 animate-pulse"></i>
                        <p class="text-xs text-neutral-500">Premium Akış Kütüphanesi Boş. Lütfen Dişli İkonundan Video Ekleyin.</p>
                    </div>
                `;
                return;
            }

            const title = state.currentLanguage === 'tr' ? video.titleTR : video.titleEN;
            const desc = state.currentLanguage === 'tr' ? video.descTR : video.descEN;

            stage.className = "mb-10 rounded-3xl overflow-hidden glass-panel border border-neutral-900 shadow-2xl ambient-glow flex flex-col";
            stage.innerHTML = `
                <div class="aspect-video w-full bg-black relative" id="playerCarrierContainer">
                    <div class="absolute inset-0 flex items-center justify-center text-neutral-500 text-xs">
                        <i class="fa-solid fa-spinner fa-spin text-xl mr-2 text-orange-500"></i> Stabilizing Premium Buffer Stream...
                    </div>
                </div>
                <div class="p-6 lg:p-8 bg-[#0F0F0F]">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                        <div>
                            <span class="text-[10px] font-bold tracking-widest text-orange-500 uppercase bg-orange-500/10 border border-orange-500/20 px-2.5 py-1 rounded-md mb-2 inline-block">
                                <i class="fa-solid fa-circle-play animate-pulse mr-1"></i> ${l.nowPlaying}
                            </span>
                            <h1 class="text-xl lg:text-3xl font-extrabold text-white tracking-tight">${sanitizeInput(title)}</h1>
                        </div>
                        <div class="flex items-center gap-2 self-start md:self-center">
                            <button onclick="toggleWatchlist('${video.id}')" class="px-4 py-2.5 rounded-xl bg-neutral-900 border border-neutral-800 hover:border-orange-500 text-xs font-semibold flex items-center gap-2 text-white transition-all cursor-pointer">
                                <i class="fa-solid ${state.watchlist.includes(video.id) ? 'fa-bookmark text-orange-500' : 'fa-bookmark'}"></i>
                                <span>${state.watchlist.includes(video.id) ? l.removeList : l.addList}</span>
                            </button>
                            <button onclick="triggerLike('${video.id}')" class="px-4 py-2.5 rounded-xl bg-neutral-900 border border-neutral-800 hover:border-red-500 text-xs font-semibold flex items-center gap-2 text-white transition-all cursor-pointer group">
                                <i class="fa-solid fa-heart text-red-500 group-hover:scale-120 transition-transform"></i>
                                <span>${video.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                    <p class="text-xs lg:text-sm text-neutral-400 leading-relaxed max-w-4xl">${sanitizeInput(desc)}</p>
                    
                    <div class="mt-8 border-t border-neutral-900 pt-6">
                        <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-comments text-orange-500"></i> ${l.commentsTitle} (${video.comments ? video.comments.length : 0})
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                            <input type="text" id="commentAuthor" class="px-4 py-2 bg-[#050505] border border-neutral-800 rounded-xl text-xs focus:outline-none focus:border-orange-500 text-white" placeholder="${l.namePlaceholder}">
                            <div class="md:col-span-2 flex gap-2">
                                <input type="text" id="commentBody" class="w-full px-4 py-2 bg-[#050505] border border-neutral-800 rounded-xl text-xs focus:outline-none focus:border-orange-500 text-white" placeholder="${l.commentPlaceholder}">
                                <button onclick="submitComment('${video.id}')" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white font-bold text-xs rounded-xl transition-all whitespace-nowrap cursor-pointer">${l.postComment}</button>
                            </div>
                        </div>
                        <div class="space-y-2 max-h-60 overflow-y-auto pr-1" id="commentsStreamContainer">
                            ${renderCommentsList(video.comments)}
                        </div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const carrier = document.getElementById('playerCarrierContainer');
                if (video.videoType === 'url') {
                    const setup = parseVideoSource(video.videoUrl);
                    if (setup.type === 'iframe') {
                        carrier.innerHTML = `<iframe src="${setup.src}" allowfullscreen allow="autoplay; picture-in-picture"></iframe>`;
                    } else {
                        carrier.innerHTML = `<video class="w-full h-full object-contain" controls autoplay><source src="${setup.src}" type="video/mp4"></video>`;
                    }
                } else if (video.videoType === 'local') {
                    const transaction = db.transaction(["localVideos"], "readonly");
                    const store = transaction.objectStore("localVideos");
                    const readReq = store.get(video.indexedDbKey);
                    readReq.onsuccess = function(e) {
                        if (e.target.result) {
                            carrier.innerHTML = `<video class="w-full h-full object-contain" controls autoplay><source src="${URL.createObjectURL(e.target.result)}" type="video/mp4"></video>`;
                        }
                    };
                }
            }, 300);
        }

        function renderCommentsList(comments) {
            const l = dictionary[state.currentLanguage];
            if (!comments || comments.length === 0) return `<p class="text-[11px] text-neutral-600 py-3 italic text-center">${l.noComments}</p>`;
            return comments.map(c => `
                <div class="bg-[#050505] border border-neutral-900 p-3 rounded-xl">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-neutral-300">${sanitizeInput(c.user)}</span>
                        <span class="text-[10px] text-neutral-600">${c.date}</span>
                    </div>
                    <p class="text-xs text-neutral-400">${sanitizeInput(c.text)}</p>
                </div>
            `).reverse().join('');
        }

        function renderCatalog() {
            const grid = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = state.videos.filter(v => {
                if (state.activeFilter === 'watchlist') return state.watchlist.includes(v.id);
                if (state.activeFilter !== 'all' && v.category !== state.activeFilter) return false;
                if (state.searchQuery) {
                    return v.titleTR.toLowerCase().includes(state.searchQuery) || v.titleEN.toLowerCase().includes(state.searchQuery);
                }
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            grid.innerHTML = filtered.map(v => {
                const title = state.currentLanguage === 'tr' ? v.titleTR : v.titleEN;
                return `
                    <div onclick="selectMediaTrack('${v.id}')" class="group bg-[#0F0F0F] border border-neutral-900 rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 hover:-translate-y-1 complex-neon-glow flex flex-col justify-between">
                        <div class="relative aspect-[3/4] overflow-hidden bg-neutral-950">
                            <img src="${sanitizeInput(v.coverUrl)}" alt="${sanitizeInput(title)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#0F0F0F] via-transparent to-transparent opacity-90"></div>
                            <span class="absolute top-3 left-3 bg-black/70 backdrop-blur-md border border-neutral-800 text-[10px] font-bold text-orange-400 px-2.5 py-1 rounded-lg uppercase tracking-wider">${v.category}</span>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-orange-600 to-red-600 flex items-center justify-center shadow-lg shadow-orange-600/50 transform scale-75 group-hover:scale-100 transition-transform duration-300">
                                    <i class="fa-solid fa-play text-white ml-1 text-sm"></i>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 flex-grow flex flex-col justify-between">
                            <h3 class="text-sm font-bold text-white group-hover:text-orange-500 transition-colors line-clamp-1 mb-1">${sanitizeInput(title)}</h3>
                            <div class="flex items-center justify-between text-[11px] text-neutral-500 mt-2">
                                <span class="flex items-center gap-1"><i class="fa-solid fa-heart text-red-500/80"></i> ${v.likes || 0}</span>
                                <span class="flex items-center gap-1"><i class="fa-solid fa-comment text-neutral-600"></i> ${v.comments ? v.comments.length : 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectMediaTrack(id) {
            state.currentVideoId = id;
            renderMediaStage(id);
            document.getElementById('mediaStage').scrollIntoView({ behavior: 'smooth' });
        }

        function triggerLike(id) {
            const v = state.videos.find(track => track.id === id);
            if (v) {
                v.likes = (v.likes || 0) + 1;
                localStorage.setItem('animeciVideos', JSON.stringify(state.videos));
                renderCatalog();
                renderMediaStage(id);
            }
        }

        function submitComment(id) {
            const user = document.getElementById('commentAuthor').value.trim();
            const text = document.getElementById('commentBody').value.trim();
            const l = dictionary[state.currentLanguage];
            if (!user || !text) return;

            const v = state.videos.find(track => track.id === id);
            if (v) {
                if (!v.comments) v.comments = [];
                v.comments.push({
                    id: 'c-' + Date.now(),
                    user: user,
                    text: text,
                    date: new Date().toLocaleDateString(state.currentLanguage === 'tr' ? 'tr-TR' : 'en-US', {hour:'2-digit', minute:'2-digit'})
                });
                localStorage.setItem('animeciVideos', JSON.stringify(state.videos));
                showToast(l.toastComment);
                renderCatalog();
                renderMediaStage(id);
            }
        }

        // CONTROL INFRASTRUCTURE MATRIX MANAGEMENT (ADMIN MODULE)
        function toggleAdminModal(open) {
            const modal = document.getElementById('adminModal');
            if (open) {
                modal.classList.replace('hidden', 'flex');
                evaluateAdminSessionState();
            } else {
                modal.classList.replace('flex', 'hidden');
                resetForm();
            }
        }

        function evaluateAdminSessionState() {
            if (state.isAdminAuthenticated) {
                document.getElementById('adminAuthGate').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                document.getElementById('adminInventoryTitle').innerText = dictionary[state.currentLanguage].adminInvTitle;
                renderAdminInventoryTable();
            } else {
                document.getElementById('adminAuthGate').classList.remove('hidden');
                document.getElementById('adminDashboard').classList.add('hidden');
            }
        }

        function authenticateAdmin() {
            if (document.getElementById('adminPasswordInput').value === "Veysel123") {
                state.isAdminAuthenticated = true;
                sessionStorage.setItem('animeciAdmin', 'true');
                document.getElementById('adminPasswordInput').value = '';
                showToast(dictionary[state.currentLanguage].toastAuthSuccess);
                evaluateAdminSessionState();
            } else {
                alert("ERR: Access Denied. Integrity Violations Logged.");
            }
        }

        function logoutAdmin() {
            state.isAdminAuthenticated = false;
            sessionStorage.removeItem('animeciAdmin');
            evaluateAdminSessionState();
        }

        function toggleSourceFields(type) {
            if (type === 'url') {
                document.getElementById('urlSourceInputGroup').classList.remove('hidden');
                document.getElementById('localSourceInputGroup').classList.add('hidden');
            } else {
                document.getElementById('urlSourceInputGroup').classList.add('hidden');
                document.getElementById('localSourceInputGroup').classList.remove('hidden');
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('formVideoId').value;
            const titleTR = document.getElementById('formTitleTR').value.trim();
            const titleEN = document.getElementById('formTitleEN').value.trim();
            const descTR = document.getElementById('formDescTR').value.trim();
            const descEN = document.getElementById('formDescEN').value.trim();
            const category = document.getElementById('formCategory').value;
            const coverUrl = document.getElementById('formCoverUrl').value.trim();
            const videoType = document.querySelector('input[name="sourceType"]:checked').value;
            const videoUrl = document.getElementById('formVideoUrl').value.trim();
            const fileInput = document.getElementById('formVideoFile');

            if (videoType === 'url') {
                commitVideoPayload(id, titleTR, titleEN, descTR, descEN, category, coverUrl, 'url', videoUrl, null);
            } else {
                const targetKey = id ? (state.videos.find(v => v.id === id)?.indexedDbKey || 'vid-' + Date.now()) : 'vid-' + Date.now();
                if (fileInput.files.length > 0) {
                    const transaction = db.transaction(["localVideos"], "readwrite");
                    transaction.objectStore("localVideos").put(fileInput.files[0], targetKey).onsuccess = function() {
                        commitVideoPayload(id, titleTR, titleEN, descTR, descEN, category, coverUrl, 'local', '', targetKey);
                    };
                } else {
                    commitVideoPayload(id, titleTR, titleEN, descTR, descEN, category, coverUrl, 'local', '', targetKey);
                }
            }
        }

        function commitVideoPayload(id, tTR, tEN, dTR, dEN, cat, cover, type, url, dbKey) {
            if (id) {
                const idx = state.videos.findIndex(v => v.id === id);
                if (idx !== -1) {
                    state.videos[idx] = { ...state.videos[idx], titleTR: tTR, titleEN: tEN, descTR: dTR, descEN: dEN, category: cat, coverUrl: cover, videoType: type, videoUrl: url, indexedDbKey: dbKey };
                }
            } else {
                state.videos.push({ id: 'm-' + Date.now(), titleTR: tTR, titleEN: tEN, descTR: dTR, descEN: dEN, category: cat, coverUrl: cover, videoType: type, videoUrl: url, indexedDbKey: dbKey, likes: 0, comments: [] });
            }
            localStorage.setItem('animeciVideos', JSON.stringify(state.videos));
            showToast(dictionary[state.currentLanguage].toastSave);
            renderCatalog();
            renderAdminInventoryTable();
            resetForm();
            if (state.currentVideoId === id) renderMediaStage(id);
        }

        function renderAdminInventoryTable() {
            document.getElementById('adminVideoTableBody').innerHTML = state.videos.map(v => `
                <tr class="border-b border-neutral-900 hover:bg-neutral-950/50 transition-colors">
                    <td class="p-3"><img src="${sanitizeInput(v.coverUrl)}" class="w-10 h-14 object-cover rounded-lg border border-neutral-800"></td>
                    <td class="p-3 font-semibold text-white">${sanitizeInput(v.titleTR)}</td>
                    <td class="p-3 uppercase text-xs text-orange-400 font-mono">${v.category}</td>
                    <td class="p-3 text-right space-x-1 whitespace-nowrap">
                        <button onclick="editVideoRecord('${v.id}')" class="px-2.5 py-1.5 bg-neutral-900 border border-neutral-800 hover:border-orange-500 rounded-lg text-xs text-neutral-300 transition-all cursor-pointer"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteVideoRecord('${v.id}')" class="px-2.5 py-1.5 bg-neutral-900 border border-neutral-800 hover:border-red-600 rounded-lg text-xs text-red-400 transition-all cursor-pointer"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function editVideoRecord(id) {
            const v = state.videos.find(track => track.id === id);
            if (!v) return;
            document.getElementById('formVideoId').value = v.id;
            document.getElementById('formTitleTR').value = v.titleTR;
            document.getElementById('formTitleEN').value = v.titleEN;
            document.getElementById('formDescTR').value = v.descTR;
            document.getElementById('formDescEN').value = v.descEN;
            document.getElementById('formCategory').value = v.category;
            document.getElementById('formCoverUrl').value = v.coverUrl;
            document.getElementById('formVideoUrl').value = v.videoUrl || '';
            document.querySelector(`input[name="sourceType"][value="${v.videoType}"]`).checked = true;
            toggleSourceFields(v.videoType);
            document.getElementById('formSaveBtn').innerText = state.currentLanguage === 'tr' ? 'Güncelle' : 'Update';
        }

        function deleteVideoRecord(id) {
            if (!confirm("Delete element?")) return;
            const target = state.videos.find(v => v.id === id);
            if (target && target.videoType === 'local' && target.indexedDbKey) {
                db.transaction(["localVideos"], "readwrite").objectStore("localVideos").delete(target.indexedDbKey);
            }
            state.videos = state.videos.filter(v => v.id !== id);
            localStorage.setItem('animeciVideos', JSON.stringify(state.videos));
            renderCatalog();
            renderAdminInventoryTable();
            if (state.currentVideoId === id) {
                state.currentVideoId = null;
                renderMediaStage(null);
            }
        }

        function resetForm() {
            document.getElementById('videoUpsertForm').reset();
            document.getElementById('formVideoId').value = '';
            toggleSourceFields('url');
            document.getElementById('formSaveBtn').innerText = dictionary[state.currentLanguage].save;
        }
    </script>
</body>
</html>
